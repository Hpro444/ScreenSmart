<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 720" font-family="Inter, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1019"/><stop offset="1" stop-color="#070a12"/>
    </linearGradient>
    <linearGradient id="bus" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b2a6b"/><stop offset="0.5" stop-color="#4434a0"/><stop offset="1" stop-color="#3b2a6b"/>
    </linearGradient>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9fb0cc"/>
    </marker>
    <marker id="arrS" markerWidth="9" markerHeight="9" refX="2" refY="3" orient="auto">
      <path d="M7,0 L0,3 L7,6 Z" fill="#9fb0cc"/>
    </marker>
    <marker id="arrA" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#f5c32d"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <style>
      .ttl{fill:#e8edf6;font-size:13.5px;font-weight:700}
      .sub{fill:#8b95a9;font-size:10.5px}
      .ico{font-size:19px}
      .lbl{fill:#9fb0cc;font-size:10px;font-weight:600}
      .lblm{fill:#6f7b93;font-size:9.5px}
      .grp{fill:#5b647a;font-size:10px;font-weight:700;letter-spacing:1.5px}
      .flow{stroke:#5b6680;stroke-width:1.6;fill:none}
      .flowA{stroke:#f5c32d;stroke-width:1.6;fill:none;stroke-dasharray:5 4}
    </style>
  </defs>

  <rect width="1320" height="720" fill="url(#bg)"/>
  <text x="660" y="44" text-anchor="middle" fill="#e8edf6" font-size="26" font-weight="800">ScreenSmart — Streaming Architecture</text>
  <text x="660" y="70" text-anchor="middle" fill="#8b95a9" font-size="13">Event-driven scatter-gather screening over Kafka, backed by one Postgres</text>

  <!-- group labels -->
  <text x="70"  y="128" class="grp">PRODUCERS</text>
  <text x="520" y="128" class="grp">SCREENING ENGINES</text>
  <text x="980" y="128" class="grp">JOIN</text>
  <text x="70"  y="452" class="grp">DATA &amp; SERVE</text>

  <!-- ===================== Kafka event bus ===================== -->
  <rect x="70" y="338" width="1180" height="58" rx="11" fill="url(#bus)" stroke="#6a5bd0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="660" y="362" text-anchor="middle" fill="#fff" font-size="14" font-weight="800">⚡  APACHE KAFKA</text>
  <text x="660" y="380" text-anchor="middle" fill="#cdc6f5" font-size="10.5">KRaft event bus · screening.txns · results.name · results.exposure · screening.verdicts</text>

  <!-- ===================== ABOVE: producers + engines ===================== -->
  <!-- ingest -->
  <rect x="70" y="150" width="175" height="86" rx="13" fill="#101726" stroke="#2b3a57" filter="url(#sh)"/>
  <rect x="70" y="150" width="175" height="4" rx="2" fill="#38bdf8"/>
  <text x="86" y="190" class="ico">📥</text>
  <text x="116" y="184" class="ttl">Ingest gateway</text>
  <text x="116" y="204" class="sub">POST /ingest · /replay</text>

  <!-- generator -->
  <rect x="275" y="150" width="175" height="86" rx="13" fill="#101726" stroke="#2b3a57" filter="url(#sh)"/>
  <rect x="275" y="150" width="175" height="4" rx="2" fill="#38bdf8"/>
  <text x="291" y="190" class="ico">⚙️</text>
  <text x="321" y="184" class="ttl">Generator</text>
  <text x="321" y="204" class="sub">continuous live feed</text>

  <!-- name worker -->
  <rect x="520" y="150" width="195" height="86" rx="13" fill="#101726" stroke="#2b4f4a" filter="url(#sh)"/>
  <rect x="520" y="150" width="195" height="4" rx="2" fill="#5eead4"/>
  <text x="536" y="190" class="ico">🧠</text>
  <text x="566" y="184" class="ttl">Name worker</text>
  <text x="566" y="204" class="sub">name + identity model</text>

  <!-- exposure worker -->
  <rect x="745" y="150" width="195" height="86" rx="13" fill="#101726" stroke="#2b4f4a" filter="url(#sh)"/>
  <rect x="745" y="150" width="195" height="4" rx="2" fill="#5eead4"/>
  <text x="761" y="190" class="ico">🕸️</text>
  <text x="791" y="184" class="ttl">Exposure worker</text>
  <text x="791" y="204" class="sub">counterparty graph hops</text>

  <!-- accumulator -->
  <rect x="980" y="150" width="195" height="86" rx="13" fill="#101726" stroke="#43356f" filter="url(#sh)"/>
  <rect x="980" y="150" width="195" height="4" rx="2" fill="#a78bfa"/>
  <text x="996" y="190" class="ico">🔀</text>
  <text x="1026" y="184" class="ttl">Accumulator</text>
  <text x="1026" y="204" class="sub">join by txn_id · worst-of</text>

  <!-- ===================== BELOW: data &amp; serve ===================== -->
  <!-- sanctions ingest -->
  <rect x="70" y="470" width="175" height="86" rx="13" fill="#101726" stroke="#2b3a57" filter="url(#sh)"/>
  <rect x="70" y="470" width="175" height="4" rx="2" fill="#38bdf8"/>
  <text x="86" y="510" class="ico">📦</text>
  <text x="116" y="504" class="ttl">Sanctions ingest</text>
  <text x="116" y="524" class="sub">OFAC · OFSI · UN · OS</text>

  <!-- postgres -->
  <rect x="300" y="470" width="185" height="86" rx="13" fill="#101726" stroke="#5a4a1f" filter="url(#sh)"/>
  <rect x="300" y="470" width="185" height="4" rx="2" fill="#f5c32d"/>
  <text x="316" y="510" class="ico">🗄️</text>
  <text x="346" y="504" class="ttl">PostgreSQL</text>
  <text x="346" y="524" class="sub">verdicts · graph · index</text>

  <!-- ws gateway -->
  <rect x="560" y="470" width="185" height="86" rx="13" fill="#101726" stroke="#1f5a3a" filter="url(#sh)"/>
  <rect x="560" y="470" width="185" height="4" rx="2" fill="#28e68c"/>
  <text x="576" y="510" class="ico">🛰️</text>
  <text x="606" y="504" class="ttl">WS gateway</text>
  <text x="606" y="524" class="sub">REST + WebSocket</text>

  <!-- frontend -->
  <rect x="820" y="470" width="185" height="86" rx="13" fill="#101726" stroke="#1f5a3a" filter="url(#sh)"/>
  <rect x="820" y="470" width="185" height="4" rx="2" fill="#28e68c"/>
  <text x="836" y="510" class="ico">🖥️</text>
  <text x="866" y="504" class="ttl">Frontend</text>
  <text x="866" y="524" class="sub">live dots + review desk</text>

  <!-- ===================== arrows: producers -> bus ===================== -->
  <line x1="157" y1="236" x2="157" y2="337" class="flow" marker-end="url(#arr)"/>
  <text x="163" y="295" class="lbl">screening.txns</text>
  <line x1="362" y1="236" x2="362" y2="337" class="flow" marker-end="url(#arr)"/>
  <text x="368" y="295" class="lblm">txns</text>

  <!-- name worker: consume up / emit down -->
  <line x1="600" y1="337" x2="600" y2="236" class="flow" marker-end="url(#arr)"/>
  <line x1="635" y1="236" x2="635" y2="337" class="flow" marker-end="url(#arr)"/>
  <text x="540" y="266" class="lblm">consume txns</text>
  <text x="618" y="320" class="lbl">results.name</text>

  <!-- exposure worker -->
  <line x1="825" y1="337" x2="825" y2="236" class="flow" marker-end="url(#arr)"/>
  <line x1="860" y1="236" x2="860" y2="337" class="flow" marker-end="url(#arr)"/>
  <text x="765" y="266" class="lblm">consume txns</text>
  <text x="838" y="320" class="lbl">results.exposure</text>

  <!-- accumulator -->
  <line x1="1045" y1="337" x2="1045" y2="236" class="flow" marker-end="url(#arr)"/>
  <line x1="1085" y1="236" x2="1085" y2="337" class="flow" marker-end="url(#arr)"/>
  <text x="985" y="266" class="lblm">txns + results</text>
  <text x="1063" y="320" class="lbl">screening.verdicts</text>

  <!-- ===================== arrows: bus -> serve / data ===================== -->
  <!-- verdicts down to ws-gateway -->
  <line x1="652" y1="397" x2="652" y2="469" class="flow" marker-end="url(#arr)"/>
  <text x="660" y="440" class="lbl">screening.verdicts</text>

  <!-- accumulator -> postgres (upsert dossier), dashed, crosses bus -->
  <path d="M1010,236 C1010,300 393,300 393,469" class="flowA" marker-end="url(#arrA)"/>
  <text x="640" y="293" class="lbl" fill="#f5c32d">upsert dossier</text>

  <!-- sanctions-ingest -> postgres -->
  <line x1="246" y1="513" x2="299" y2="513" class="flow" marker-end="url(#arr)"/>
  <text x="250" y="505" class="lblm">entities</text>

  <!-- postgres <-> ws-gateway -->
  <line x1="486" y1="513" x2="559" y2="513" class="flow" marker-end="url(#arr)" marker-start="url(#arrS)"/>
  <text x="495" y="505" class="lblm">queries</text>

  <!-- ws-gateway -> frontend -->
  <line x1="746" y1="513" x2="819" y2="513" class="flow" marker-end="url(#arr)"/>
  <text x="752" y="505" class="lblm">REST · WS</text>

  <!-- ===================== legend ===================== -->
  <g transform="translate(1010,470)">
    <rect x="0" y="0" width="240" height="86" rx="12" fill="#0d1320" stroke="#222d44"/>
    <text x="14" y="22" class="grp">LEGEND</text>
    <line x1="14" y1="40" x2="40" y2="40" class="flow" marker-end="url(#arr)"/>
    <text x="48" y="44" class="sub">Kafka topic flow</text>
    <line x1="14" y1="60" x2="40" y2="60" class="flowA" marker-end="url(#arrA)"/>
    <text x="48" y="64" class="sub">database read / write</text>
    <circle cx="150" cy="40" r="5" fill="#28e68c"/><text x="160" y="44" class="sub">allowed</text>
    <circle cx="150" cy="60" r="5" fill="#f5c32d"/><text x="160" y="64" class="sub">review</text>
    <circle cx="212" cy="40" r="5" fill="#f74856"/><text x="222" y="44" class="sub">blocked</text>
  </g>
</svg>
