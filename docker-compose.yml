# ScreenSmart — run the screening API + Postgres in containers.
#   docker compose up --build      → API + Swagger at http://localhost:8000/docs
#
# The image (built from ./screensmart_app) bakes in the trained model.
# The host data directory (sanctions list) is mounted read-only into the API container,
# and the structured audit logs are mounted back out so they persist on the host.
#
# Scale screening across CPU cores with PROCESSES, not threads (GIL — see ARCHITECTURE §9):
#   docker compose up --build --scale screensmart-api=4   (behind a load balancer)
# or override the uvicorn command for multiple workers:
#   command: ["uvicorn","screensmart.api:app","--host","0.0.0.0","--port","8000","--workers","4"]
services:
  screensmart-api:
    build:
      context: ./screensmart_app
      dockerfile: Dockerfile
    image: screensmart-api:latest
    container_name: screensmart-api
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./screensmart_app/logs:/app/logs
      - ./screensmart_app/models:/app/models:ro   # host-built model, mounted (not baked)
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    restart: unless-stopped

  sanctions-ingest:
    build:
      context: ./sanctions_ingestion
      dockerfile: Dockerfile
    image: sanctions-ingest:latest
    container_name: sanctions-ingest
    env_file:
      - .env
    environment:
      # Reuse the compose Postgres; service name `postgres` is the in-network host.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SANCTIONS_INGEST_LOGS_DIR: /app/logs
    volumes:
      - ./data:/app/data                       # persist freshly downloaded raw files
      - ./sanctions_ingestion/logs:/app/logs    # ingest audit logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Event backbone for the streaming pipeline (ingest → screening services →
  # accumulator → verdicts). Single-node KRaft (no Zookeeper). In-network clients use
  # `kafka:9092`; host/dev tools use `localhost:29092`.
  kafka:
    image: apache/kafka:3.9.0
    container_name: screensmart-kafka
    ports:
      - "29092:29092"          # host access (dev)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      # In combined broker+controller (KRaft) mode the controller listener's advertised
      # address is derived from `listeners` unless given here; without a routable
      # CONTROLLER entry it resolves to 0.0.0.0 and `kafka-storage format` aborts at boot.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - screensmart_kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: ${POSTGRES_CONTAINER_NAME:-screensmart-postgres}
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - screensmart_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ---- streaming pipeline: ingest → workers → accumulator → ws-gateway → frontend ----
  ingest:
    build: { context: ./streaming }
    image: screensmart-streaming:latest
    container_name: screensmart-ingest
    command: ["uvicorn", "pipeline.ingest:app", "--host", "0.0.0.0", "--port", "8090"]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    ports:
      - "8090:8090"                 # POST /ingest, POST /ingest/replay
    volumes:
      - ./data:/app/data:ro         # replay reads the synthetic transactions parquet
    depends_on:
      kafka: { condition: service_healthy }
    restart: unless-stopped

  # Always-on traffic source: continuously feeds fresh, realistically-labelled payments
  # into screening.txns so the live feed / dashboard animation always reflects genuine
  # screening activity (not a finite replay). Tune throughput with GEN_RATE.
  generator:
    build: { context: ./streaming }
    image: screensmart-streaming:latest
    container_name: screensmart-generator
    command: ["python", "-m", "pipeline.generator"]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      GEN_RATE: "8"
      GEN_JITTER: "0.5"
    volumes:
      - ./data:/app/data:ro
    depends_on:
      kafka: { condition: service_healthy }
    restart: unless-stopped

  screensmart-worker:
    build: { context: ./screensmart_app }
    image: screensmart-api:latest    # same image as the API, different command
    container_name: screensmart-worker
    command: ["python", "-m", "screensmart.worker"]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    volumes:
      - ./data:/app/data:ro
      - ./screensmart_app/models:/app/models:ro   # host-built model, mounted (not baked)
    depends_on:
      kafka: { condition: service_healthy }
    restart: unless-stopped

  exposure-worker:
    build: { context: ./exposure_graph }
    image: exposure-graph:latest
    container_name: exposure-worker
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      kafka: { condition: service_healthy }
      postgres: { condition: service_healthy }
    restart: unless-stopped

  accumulator:
    build: { context: ./streaming }
    image: screensmart-streaming:latest
    container_name: screensmart-accumulator
    command: ["python", "-m", "pipeline.accumulator"]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      kafka: { condition: service_healthy }
      postgres: { condition: service_healthy }
    restart: unless-stopped

  ws-gateway:
    build: { context: ./streaming }
    image: screensmart-streaming:latest
    container_name: screensmart-ws
    command: ["uvicorn", "pipeline.ws_gateway:app", "--host", "0.0.0.0", "--port", "8091"]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:-dev-screensmart-secret-change-me}
    ports:
      - "8091:8091"                 # REST (/auth, /review, /stats) + WS (/ws/feed)
    depends_on:
      kafka: { condition: service_healthy }
      postgres: { condition: service_healthy }
    restart: unless-stopped

  frontend:
    build: { context: ./frontend }
    image: screensmart-frontend:latest
    container_name: screensmart-frontend
    ports:
      - "8080:80"                   # the dashboard → http://localhost:8080
    depends_on:
      - ws-gateway
    restart: unless-stopped

volumes:
  screensmart_pgdata:
  screensmart_kafkadata:
