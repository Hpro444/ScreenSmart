# ScreenSmart — run the screening API in a container.
#   docker compose up --build      → API + Swagger at http://localhost:8000/docs
#
# The image (built from ./screensmart_app) bakes in the trained model; the host data
# directory (the sanctions list) is mounted read-only, and the structured audit logs
# are mounted back out so they persist on the host.
services:
  screensmart-api:
    build:
      context: ./screensmart_app
      dockerfile: Dockerfile
    image: screensmart-api:latest
    container_name: screensmart-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro                 # sanctions_clean.parquet (+ transactions) — read-only
      - ./screensmart_app/logs:/app/logs    # persist the JSON-lines audit log on the host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    # Scale screening across CPU cores with PROCESSES, not threads (GIL — see ARCHITECTURE §9):
    #   docker compose up --scale screensmart-api=4   (behind a load balancer)
    # or run uvicorn with multiple workers by overriding the command:
    #   command: ["uvicorn","screensmart.api:app","--host","0.0.0.0","--port","8000","--workers","4"]
